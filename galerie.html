<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Le Délice Africain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/galerie.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="header-sticky">
        <div class="container">
            <a href="index.html" class="logo" aria-label="Accueil - Le Délice Africain"><i class="fas fa-utensils"></i> Le Délice Africain</a>
            <nav aria-label="Menu principal">
                <a href="index.html#accueil">Accueil</a>
                <a href="resto.html">Notre Menu</a>
                <a href="galerie.html">Galerie</a>
                <a href="index.html#apropos">À propos</a>
                <a href="index.html#contact">Contact</a>
            </nav>
            <button class="mobile-menu-btn" aria-label="Ouvrir le menu mobile" aria-expanded="false">
                <i class="fas fa-bars"></i>
                <i class="fas fa-times" style="display:none"></i>
            </button>
        </div>
    </header>

    <main>
        <section class="section-galerie" aria-labelledby="galerie-heading">
            <div class="container">
                <h1 id="galerie-heading" class="section-title">Galerie <span>Photos</span></h1>
                <p class="subtitle">Quelques images de nos plats et de l'ambiance du restaurant.</p>

                <div class="galerie-carousel" role="list">
                    <div class="galerie-item" role="listitem">
                        <a href="images/Tilapia braisé.jfif" class="galerie-link" data-src="images/Tilapia braisé.jfif">
                            <img src="images/Tilapia braisé.jfif" alt="Tilapia braisé">
                        </a>
                    </div>
                    <div class="galerie-item" role="listitem">
                        <a href="images/riz-alloco-viande.jfif" class="galerie-link" data-src="images/riz-alloco-viande.jfif">
                            <img src="images/riz-alloco-viande.jfif" alt="Riz alloco et viande">
                        </a>
                    </div>
                    <div class="galerie-item" role="listitem">
                        <a href="images/poisson.jfif" class="galerie-link" data-src="images/poisson.jfif">
                            <img src="images/poisson.jfif" alt="Poisson braisé">
                        </a>
                    </div>
                    <div class="galerie-item" role="listitem">
                        <a href="images/crêpes.jfif" class="galerie-link" data-src="images/crêpes.jfif">
                            <img src="images/crêpes.jfif" alt="Crêpes">
                        </a>
                    </div>
                    <div class="galerie-item" role="listitem">
                        <a href="images/desserts-variés.jfif" class="galerie-link" data-src="images/desserts-variés.jfif">
                            <img src="images/desserts-variés.jfif" alt="Desserts variés">
                        </a>
                    </div>
                    <div class="galerie-item" role="listitem">
                        <a href="images/beignets-maison.jfif" class="galerie-link" data-src="images/beignets-maison.jfif">
                            <img src="images/beignets-maison.jfif" alt="Beignets maison">
                        </a>
                    </div>
                </div>

                <!-- Signature visuelle unique : badge décoratif (décor, non interactif) -->
                <div class="signature-badge" aria-hidden="true">
                    <i class="fas fa-utensils"></i>
                    <span class="signature-text">Le Délice — Signature</span>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Le Délice Africain. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
    // Réutiliser le script mobile existant pour cohérence
    (function(){
        const btn = document.querySelector('.mobile-menu-btn');
        const nav = document.querySelector('nav');
        if (!btn || !nav) return;

        function openMenu(){ nav.classList.add('active'); btn.classList.add('active'); btn.setAttribute('aria-expanded', 'true'); btn.setAttribute('aria-label', 'Fermer le menu mobile'); }
        function closeMenu(){ nav.classList.remove('active'); btn.classList.remove('active'); btn.setAttribute('aria-expanded', 'false'); btn.setAttribute('aria-label', 'Ouvrir le menu mobile'); }

        btn.addEventListener('click', function(e){ const expanded = btn.getAttribute('aria-expanded') === 'true'; if (expanded) closeMenu(); else openMenu(); e.stopPropagation(); });
        nav.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
        document.addEventListener('click', function(e){ if (!nav.contains(e.target) && !btn.contains(e.target)) closeMenu(); });
        document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeMenu(); });
    })();
    </script>
    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-hidden="true" style="display:none">
        <button class="lightbox-close" aria-label="Fermer la vue image">×</button>
        <div class="lightbox-inner">
            <img src="" alt="" id="lightbox-img">
            <p id="lightbox-caption" class="lightbox-caption"></p>
        </div>
    </div>

    <script>
    (function(){
        const links = document.querySelectorAll('.galerie-link');
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbCaption = document.getElementById('lightbox-caption');
        const lbClose = document.querySelector('.lightbox-close');
        let lastFocused = null;

        function open(src, alt){
            lastFocused = document.activeElement;
            lbImg.src = src;
            lbImg.alt = alt || '';
            lbCaption.textContent = alt || '';
            lightbox.style.display = 'flex';
            lightbox.setAttribute('aria-hidden','false');
            lbClose.focus();
            document.body.style.overflow = 'hidden';
        }

        function close(){
            lightbox.style.display = 'none';
            lightbox.setAttribute('aria-hidden','true');
            lbImg.src = '';
            document.body.style.overflow = '';
            if (lastFocused) lastFocused.focus();
        }

        links.forEach(link => {
            link.addEventListener('click', function(e){
                e.preventDefault();
                const src = this.dataset.src || this.href;
                const alt = this.querySelector('img')?.alt || '';
                open(src, alt);
            });
        });

        lbClose.addEventListener('click', close);

        lightbox.addEventListener('click', function(e){
            if (e.target === lightbox) close();
        });

        document.addEventListener('keydown', function(e){
            if (e.key === 'Escape' && lightbox.style.display === 'flex') close();
        });
    })();
    </script>
</body>

</html>
