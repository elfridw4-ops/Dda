<!DOCTYPE html>
<html lang="fr"> <!-- Langue définie pour l'accessibilité -->

<head>
    <meta charset="UTF-8"> <!-- Encodage des caractères -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivité -->
    <title>Bouton d'action</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Lien vers le CSS centralisé -->
</head>

<body>
    <!--
        COMPOSANT : Bouton d'action
        --------------------------
        Rôle : Bouton générique pour déclencher une action (commande, réservation, navigation, etc.).
        
        Classes disponibles :
        - .btn : Style par défaut (vert).
        - .btn-primary : Style pour les actions principales (ex: "Réserver une table").
        - .btn-secondary : Style pour les actions secondaires (ex: "Voir le menu").
        
        Bonnes pratiques :
        - Toujours utiliser un attribut `aria-label` pour l'accessibilité.
        - Privilégier les libellés courts et actionnels (ex: "Commander", "Réserver").
        - Éviter les boutons vides : toujours inclure un texte ou une icône.
        
        Exemples d'utilisation :
        <a href="#contact" class="btn btn-primary">Réserver une table</a>
        <a href="resto.html" class="btn btn-secondary">Voir notre menu</a>
    -->
    <a href="#" class="btn">Commander Maintenant</a>

</body>

</html>
