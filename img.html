<!DOCTYPE html>
<html lang="fr"> <!-- Langue définie pour l'accessibilité -->

<head>
    <meta charset="UTF-8"> <!-- Encodage des caractères -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsivité -->
    <title>Image avec effet de zoom</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Lien vers le CSS centralisé -->
</head>

<body>
    <!--
        COMPOSANT : Image avec effet de zoom
        -----------------------------------
        Rôle : Affiche une image avec un effet de zoom au survol pour mettre en valeur un plat ou un élément visuel.
        
        Bonnes pratiques :
        - Toujours utiliser un attribut `alt` pour l'accessibilité.
        - Privilégier les formats modernes (WebP) pour optimiser les performances.
        - Utiliser la classe `zoom-image` pour activer l'effet de zoom.
        - Éviter les images trop lourdes (> 200 Ko).
        
        Exemple d'utilisation :
        <img src="images/plat.jpg" alt="Poulet Braisé" class="zoom-image">
    -->
    <img src="images/1.jpg" alt="Plat" class="zoom-image"> <!-- Image avec effet de zoom au survol -->

</body>

</html>
